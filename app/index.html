<!DOCTYPE html>
<html>
<head>
    <title>CloudScale DevOps Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f8;
            margin: 0;
            padding: 0;
        }

        .dashboard {
            width: 80%;
            max-width: 800px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1d4ed8;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 30px;
        }

        .status-box {
            background: #f8fafc;
            border-left: 5px solid #1d4ed8;
            padding: 15px;
            margin: 12px 0;
            text-align: left;
            font-size: 18px;
        }

        .running {
            color: green;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>CloudScale Project 2</h1>
        <h2>Infrastructure as Code with Terraform and Azure ACI</h2>

        <div class="status-box">Docker Image: <span class="running">Running</span></div>
        <div class="status-box">Azure Container Instance: <span class="running">Deployed</span></div>
        <div class="status-box">Terraform: <span class="running">Infrastructure Created</span></div>
        <div class="status-box">GitHub Actions: <span class="running">CI/CD Enabled</span></div>
        <div class="status-box">Environment: <span class="running">Production</span></div>

        <p class="footer">Created by: Mayar and Malak</p>
    </div>
</body>
</html>
